<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fichero de juegos</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f7f8fb;
      margin: 0;
      padding: 2rem;
      color: #111827;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 0.25rem;
      color: #111827;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }
    p {
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #475569;
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      padding: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #475569;
      text-transform: uppercase;
    }
    input, select, textarea {
      width: 100%;
      padding: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      box-sizing: border-box;
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      background: #ffffff;
      color: #111827;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }
    input.filled, select.filled, textarea.filled {
      background: #e8eef7;
    }
    #intensidad.intensidad-baja {
      background: #dcfce7;
    }
    #intensidad.intensidad-media {
      background: #fef3c7;
    }
    #intensidad.intensidad-alta {
      background: #fce7f3;
    }
    input::placeholder, textarea::placeholder {
      color: #94a3b8;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 0.95rem 1.6rem;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }
    button.primary {
      background: #111827;
      color: #ffffff;
    }
    button.secondary {
      background: #f8fafc;
      color: #111827;
      border: 1px solid #d1d5db;
    }
    button.danger {
      background: #ef4444;
      color: #ffffff;
    }
    button.warning {
      background: #f59e0b;
      color: #ffffff;
    }
    button.mini {
      padding: 0.25rem 0.7rem;
      font-size: 0.78rem;
      border-radius: 999px;
      line-height: 1.1;
    }
    .tabs {
      display: flex;
      gap: 0.75rem;
      margin: 1.75rem 0 1rem;
      flex-wrap: wrap;
    }
    .tab {
      padding: 0.9rem 1.3rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      cursor: pointer;
      color: #475569;
      font-weight: 700;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .tab.active {
      background: #111827;
      color: #ffffff;
      border-color: #111827;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .alert {
      margin-top: 1.25rem;
      padding: 0.95rem 1rem;
      border-radius: 18px;
      background: #eff6ff;
      color: #1e293b;
      border: 1px solid #bfdbfe;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 1rem;
      font-size: 0.95rem;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px #e2e8f0;
    }
    th, td {
      padding: 1rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    table.tabla-compacta th,
    table.tabla-compacta td {
      padding: 0.6rem 1rem;
    }
    th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.82rem;
    }
    tbody tr {
      background: #ffffff;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    .actions-cell button {
      margin-right: 0.5rem;
      margin-bottom: 0.25rem;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      font-size: 0.88rem;
    }
    #tablaContainerTodos .actions-cell button {
      display: none;
    }
    #tablaContainerTodos.modo-editar .actions-cell button {
      display: inline-block;
    }
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .container { padding: 1.25rem; }
      .actions { flex-direction: column; }
      table, th, td { display: block; }
      th { text-align: right; }
      td { text-align: right; padding-left: 50%; position: relative; }
      td::before {
        content: attr(data-label);
        position: absolute;
        left: 0;
        width: 45%;
        padding-left: 0.75rem;
        font-weight: 700;
        text-align: left;
        color: #475569;
      }
    }
    .tabla-scroll-wrapper {
      width: 100%;
      overflow-x: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 0 0 1px #e2e8f0;
      padding-bottom: 2px;
    }
    .tab-todos-wrapper, #tab-buscar {
      position: relative;
    }
    #btnEditarModo, #btnEditarModoBuscar, #btnEditarModoTodos {
      position: absolute;
      top: -5.5rem;
      right: 2rem;
      z-index: 2;
      margin: 0;
    }
    @media (max-width: 640px) {
      #btnEditarModo, #btnEditarModoBuscar, #btnEditarModoTodos {
        right: 1rem;
        top: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fichero de juegos</h1>
    <p>Registra juegos con varias variables y guárdalos en tu navegador.</p>

    <div class="tabs">
      <button class="tab active" type="button" data-tab="formulario">Registrar</button>
      <button class="tab" type="button" data-tab="buscar">Buscar</button>
      <button class="tab" type="button" data-tab="planificar">Planificar</button>
      <button class="tab" type="button" data-tab="todos">Todos los juegos</button>
    </div>

    <div class="tab-panel active" id="tab-formulario">
      <div class="grid">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: Carrera del Castillo" required>
        </div>
        <div style="grid-column: 1 / -1;">
          <label>Clasificación</label>
          <div class="grid" style="grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem;">
            <div>
              <select id="clasificacion1">
                <option value="">Seleccionar</option>
                <option value="Ronda">Ronda</option>
                <option value="Deportivo">Deportivo</option>
                <option value="Salón">Salón</option>
                <option value="Musical">Musical</option>
                <option value="Nocturno">Nocturno</option>
                <option value="Gran Juego">Gran Juego</option>
                <option value="Cooperativo">Cooperativo</option>
                <option value="Competitivo">Competitivo</option>
              </select>
            </div>
            <div>
              <select id="clasificacion2">
                <option value="">Seleccionar</option>
                <option value="Ronda">Ronda</option>
                <option value="Deportivo">Deportivo</option>
                <option value="Salón">Salón</option>
                <option value="Musical">Musical</option>
                <option value="Nocturno">Nocturno</option>
                <option value="Gran Juego">Gran Juego</option>
                <option value="Cooperativo">Cooperativo</option>
                <option value="Competitivo">Competitivo</option>
              </select>
            </div>
            <div>
              <select id="clasificacion3">
                <option value="">Seleccionar</option>
                <option value="Ronda">Ronda</option>
                <option value="Deportivo">Deportivo</option>
                <option value="Salón">Salón</option>
                <option value="Musical">Musical</option>
                <option value="Nocturno">Nocturno</option>
                <option value="Gran Juego">Gran Juego</option>
                <option value="Cooperativo">Cooperativo</option>
                <option value="Competitivo">Competitivo</option>
              </select>
            </div>
          </div>
          <p class="small-note">Selecciona hasta 3 opciones distintas, sin repetir las ya elegidas antes.</p>
        </div>
        <div>
          <label for="intensidad">Intensidad</label>
          <select id="intensidad">
            <option value="">Seleccionar intensidad</option>
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
          </select>
        </div>
        <div>
          <label for="lugar">Lugar</label>
          <select id="lugar">
            <option value="">Seleccionar lugar</option>
            <option value="Interior">Interior</option>
            <option value="Exterior">Exterior</option>
            <option value="Interior/Exterior">Interior/Exterior</option>
          </select>
        </div>
        <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem;">
          <div>
            <label for="participantesMin">Participantes mín.</label>
            <input type="number" id="participantesMin" placeholder="Ej: 2" min="1">
          </div>
          <div>
            <label for="participantesMax">Participantes máx.</label>
            <input type="number" id="participantesMax" placeholder="Ej: 6" min="1">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem;">
          <div>
            <label for="edadesMin">Edad mínima</label>
            <input type="number" id="edadesMin" placeholder="Ej: 2" min="0">
          </div>
          <div>
            <label for="edadesMax">Edad máxima</label>
            <input type="number" id="edadesMax" placeholder="Ej: 18" min="0">
          </div>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="objetivo">Objetivo</label>
          <textarea id="objetivo" placeholder="Describe el objetivo del juego..."></textarea>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="desarrollo">Desarrollo</label>
          <textarea id="desarrollo" placeholder="Explica cómo se desarrolla el juego paso a paso..."></textarea>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="materiales">Materiales</label>
          <textarea id="materiales" placeholder="Lista los materiales necesarios..."></textarea>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="variantes">Variantes</label>
          <textarea id="variantes" placeholder="Añade variantes o reglas opcionales..."></textarea>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" placeholder="Comentarios adicionales..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="guardarBtn">Registrar juego</button>
        <button class="secondary" id="limpiarBtn">Limpiar formulario</button>
      </div>

      <div class="alert" id="mensaje" style="display:none;"></div>
    </div>

    <!-- Panel Buscar -->
    <div class="tab-panel" id="tab-buscar">
      <button id="btnEditarModoBuscar" class="secondary">Editar</button>
      <div style="margin-bottom:1.2rem;">
        <input type="text" id="filtro" placeholder="Buscar por nombre, clasificación, etc..." style="width:100%;padding:1rem;border-radius:18px;border:1px solid #d1d5db;">
      </div>
      <div id="tablaContainer"></div>
    </div>

    <!-- Panel Planificar -->
    <div class="tab-panel" id="tab-planificar">
      <div id="planificar-filtros" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.2rem;"></div>
      <div id="planificar-contenido"></div>
    </div>

    <!-- Panel Todos los juegos -->
    <div class="tab-panel tab-todos-wrapper" id="tab-todos">
      <button id="btnEditarModoTodos" class="secondary">Editar</button>
      <div id="tablaContainerTodos"></div>
    </div>
  </div>

  <script>
    // =============== CONFIGURACIÓN FIREBASE ===============
    // IMPORTANTE: Reemplaza estos valores con tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyB_ejemplo_reemplaza_esto",
      authDomain: "fichero-de-juegos.firebaseapp.com",
      projectId: "fichero-de-juegos",
      databaseURL: "https://fichero-de-juegos-default-rtdb.firebaseio.com",
      storageBucket: "fichero-de-juegos.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123def456"
    };

    // Inicializar Firebase
    let firebaseReady = false;
    try {
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const juegoRef = database.ref('juegos');
      firebaseReady = true;
      console.log('✓ Firebase inicializado correctamente');
    } catch (error) {
      console.warn('Firebase no disponible, usando almacenamiento local:', error.message);
      firebaseReady = false;
    }

    // =============== VARIABLES Y CONSTANTES ===============
    const STORAGE_KEY = 'baseDatosJuegos';
    let juegos = [];
    let editIndex = -1;
    let modoEditarHabilitado = false;

    const $ = id => document.getElementById(id);
    const campos = ['nombre','intensidad','lugar','objetivo','desarrollo','materiales','variantes','observaciones'];
    const opcionesClasificacion = ['Ronda','Deportivo','Salón','Musical','Nocturno','Gran Juego','Cooperativo','Competitivo'];

    function getClasificacionValues() {
      return ['clasificacion1','clasificacion2','clasificacion3']
        .map(id => $(id).value.trim())
        .filter(value => value);
    }

    function setClasificacionValues(values) {
      const valores = Array.isArray(values) ? values : String(values).split(',').map(v => v.trim()).filter(v => v);
      ['clasificacion1','clasificacion2','clasificacion3'].forEach((id, index) => {
        $(id).value = valores[index] || '';
      });
      actualizarClasificacionSelects();
    }

    function actualizarClasificacionSelects() {
      const seleccionadas = getClasificacionValues();
      ['clasificacion1','clasificacion2','clasificacion3'].forEach((id, index) => {
        const select = $(id);
        const valorActual = select.value;
        const bloqueadas = seleccionadas.slice(0, index);
        select.innerHTML = '<option value="">Seleccionar</option>' + opcionesClasificacion
          .filter(opcion => !bloqueadas.includes(opcion))
          .map(opcion => `<option value="${opcion}">${opcion}</option>`)
          .join('');
        if (valorActual && !bloqueadas.includes(valorActual)) {
          select.value = valorActual;
        }
      });
    }

    function actualizarIntensidadColor() {
      // Esta función ya no aplica estilos especiales a intensidad
      actualizarEstadosCampos();
    }

    function actualizarEstadosCampos() {
      const todosLosCampos = document.querySelectorAll('input, select, textarea');
      todosLosCampos.forEach(campo => {
        if (campo.value.trim()) {
          campo.classList.add('filled');
        } else {
          campo.classList.remove('filled');
        }
      });
    }

    function habilitarModoEditar() {
      modoEditarHabilitado = !modoEditarHabilitado;
      // Cambiar color de ambos botones Editar
      const btnBuscar = document.getElementById('btnEditarModoBuscar');
      const btnTodos = document.getElementById('btnEditarModoTodos');
      const tablaContainerTodos = document.getElementById('tablaContainerTodos');
      if (modoEditarHabilitado) {
        // Solicitar contraseña solo al habilitar
        const contraseña = prompt('Ingresa la contraseña para habilitar la edición:');
        if (contraseña === null) { modoEditarHabilitado = false; return; }
        if (contraseña !== 'jugar es abrir la puerta prohibida') {
          mostrarMensaje('Contraseña incorrecta.', 'error');
          modoEditarHabilitado = false;
          return;
        }
        if (btnBuscar) {
          btnBuscar.style.background = '#111827';
          btnBuscar.style.color = '#fff';
        }
        if (btnTodos) {
          btnTodos.style.background = '#111827';
          btnTodos.style.color = '#fff';
        }
        if (tablaContainerTodos) {
          tablaContainerTodos.classList.add('modo-editar');
        }
        mostrarMensaje('Modo editar habilitado. Ahora puedes editar y eliminar juegos.');
      } else {
        if (btnBuscar) {
          btnBuscar.style.background = '';
          btnBuscar.style.color = '';
        }
        if (btnTodos) {
          btnTodos.style.background = '';
          btnTodos.style.color = '';
        }
        if (tablaContainerTodos) {
          tablaContainerTodos.classList.remove('modo-editar');
        }
        mostrarMensaje('Modo editar deshabilitado.');
      }
      // Actualizar ambas tablas
      actualizarTabla();
      actualizarTablaTodos();
    }

    function mostrarMensaje(texto, tipo = 'info') {
      const mensaje = $('mensaje');
      mensaje.textContent = texto;
      mensaje.style.display = 'block';
      mensaje.style.background = tipo === 'error' ? '#fdecea' : '#e8f0fe';
      mensaje.style.color = tipo === 'error' ? '#991b1b' : '#1a202c';
      setTimeout(() => mensaje.style.display = 'none', 3000);
    }

    function limpiarFormulario() {
      campos.forEach(c => $(c).value = '');
      ['clasificacion1','clasificacion2','clasificacion3'].forEach(id => $(id).value = '');
      actualizarClasificacionSelects();
      $('participantesMin').value = '';
      $('participantesMax').value = '';
      $('edadesMin').value = '';
      $('edadesMax').value = '';
      $('intensidad').value = '';
      actualizarEstadosCampos();
      actualizarIntensidadColor();
      editIndex = -1;
      $('guardarBtn').textContent = 'Registrar juego';
    }

    function guardarDatos() {
      // Guardar primero en localStorage (backup)
      guardarEnLocalStorage();
      // Intentar guardar en Firebase
      guardarEnFirebase();
    }

    function guardarEnLocalStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(juegos));
      } catch (error) {
        console.error('Error al guardar en localStorage:', error);
      }
    }

    function guardarEnFirebase() {
      if (!firebaseReady) {
        mostrarMensajeGuardado();
        return;
      }

      try {
        // Convertir array de juegos a objeto con IDs para Firebase
        const juegosPorGuardar = {};
        juegos.forEach((juego, idx) => {
          juegosPorGuardar[idx] = juego;
        });

        juegoRef.set(juegosPorGuardar, (error) => {
          if (error) {
            console.error('Error al guardar en Firebase:', error);
            mostrarMensaje('Error en sincronización con Firebase. Se guarda localmente.', 'error');
          } else {
            mostrarMensajeGuardado();
            console.log('✓ Datos sincronizados con Firebase');
          }
        });
      } catch (error) {
        console.error('Error en guardarEnFirebase:', error);
      }
    }

    function mostrarMensajeGuardado() {
      const mensaje = $('mensaje');
      const provider = firebaseReady ? '☁️ Sincronizado en la nube' : '✓ Guardado localmente';
      mensaje.textContent = provider;
      mensaje.style.display = 'block';
      mensaje.style.background = '#dcfce7';
      mensaje.style.color = '#15803d';
      setTimeout(() => mensaje.style.display = 'none', 2000);
    }

    function cargarDesdeLocalStorage() {
      try {
        const datos = localStorage.getItem(STORAGE_KEY);
        juegos = datos ? JSON.parse(datos) : [];
        // Migrar comentarioUsuario a comentarios[] si es necesario
        juegos.forEach(juego => {
          if (juego.comentarioUsuario && !juego.comentarios) {
            juego.comentarios = [{
              texto: juego.comentarioUsuario,
              fecha: new Date().toLocaleDateString()
            }];
            delete juego.comentarioUsuario;
          }
          if (!juego.comentarios) {
            juego.comentarios = [];
          }
        });
        guardarDatos();
        console.log(`✓ Se cargaron ${juegos.length} juegos desde almacenamiento local`);
      } catch (error) {
        console.error('Error al cargar desde localStorage:', error);
        juegos = [];
        mostrarMensaje('Error al cargar los datos. Se inicia con base de datos vacía.', 'error');
      }
    }

    function cargarDesdeFirebase() {
      if (!firebaseReady) {
        console.log('Firebase no disponible, usando solo almacenamiento local');
        return;
      }

      juegoRef.on('value', (snapshot) => {
        try {
          const datos = snapshot.val();
          if (datos) {
            // Firebase devuelve un objeto, convertir a array
            juegos = Object.values(datos).map(juego => {
              if (!juego.comentarios) juego.comentarios = [];
              return juego;
            });
            console.log(`✓ Se sincronizaron ${juegos.length} juegos desde Firebase`);
          } else {
            juegos = [];
            console.log('Base de datos vacía');
          }
          // Guardar también en localStorage como backup
          guardarDatos();
          // Actualizar tablas
          actualizarTabla();
          actualizarTablaTodos();
          renderizarFiltrosPlanificar();
          filtrarPlanificar();
        } catch (error) {
          console.error('Error al procesar datos de Firebase:', error);
        }
      }, (error) => {
        console.error('Error al leer Firebase:', error);
        mostrarMensaje('Error al conectar con la nube. Usando datos locales.', 'error');
      });
    }

    function validarFormulario() {
      if (!$('nombre').value.trim()) {
        mostrarMensaje('El nombre del juego es obligatorio.', 'error');
        return false;
      }
      return true;
    }

    function normalizarTexto(texto) {
      return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function actualizarTabla() {

    function registrarJuego() {
      if (!validarFormulario()) return;

      const nuevoJuego = {};
      campos.forEach(c => nuevoJuego[c] = $(c).value.trim());
      nuevoJuego.clasificacion = getClasificacionValues().join(', ');
      const minPart = $('participantesMin').value.trim();
      const maxPart = $('participantesMax').value.trim();
      nuevoJuego.participantes = minPart && maxPart ? `${minPart}-${maxPart}` : minPart || maxPart || '';
      const minEdad = $('edadesMin').value.trim();
      const maxEdad = $('edadesMax').value.trim();
      nuevoJuego.edades = minEdad && maxEdad ? `${minEdad}-${maxEdad}` : minEdad || maxEdad || '';

      // Guardar fecha de registro si es nuevo
      if (editIndex >= 0) {
        // Mantener la fecha original si existe
        nuevoJuego.fechaRegistro = juegos[editIndex].fechaRegistro || new Date().toLocaleDateString();
        juegos[editIndex] = nuevoJuego;
        mostrarMensaje('Juego actualizado correctamente.');
      } else {
        nuevoJuego.fechaRegistro = new Date().toLocaleDateString();
        juegos.push(nuevoJuego);
        mostrarMensaje('Juego registrado correctamente.');
      }

      guardarDatos();
      actualizarTabla();
      actualizarTablaTodos();
      limpiarFormulario();
    }

    function editarJuego(index) {
      const juego = juegos[index];
      campos.forEach(c => $(c).value = juego[c] || '');
      setClasificacionValues(juego.clasificacion || []);
      if (juego.participantes) {
        const partes = juego.participantes.split('-').map(x=>parseInt(x.trim(),10));
        $('participantesMin').value = partes[0] || '';
        $('participantesMax').value = partes[1] || '';
      } else {
        $('participantesMin').value = '';
        $('participantesMax').value = '';
      }
      if (juego.edades) {
        const partesEdad = juego.edades.split('-').map(x=>parseInt(x.trim(),10));
        $('edadesMin').value = partesEdad[0] || '';
        $('edadesMax').value = partesEdad[1] || '';
      } else {
        $('edadesMin').value = '';
        $('edadesMax').value = '';
      }
      editIndex = index;
      $('guardarBtn').textContent = 'Guardar cambios';
      actualizarEstadosCampos();
      actualizarIntensidadColor();
      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (juegos[indexJuego].comentarios && juegos[indexJuego].comentarios[indexComentario]) {

    function getValoresUnicos(key) {
      if (key === 'clasificacion') {
        // Split by comma and trim, then get unique values
        const all = juegos.flatMap(j => (j.clasificacion||'').split(',').map(s => s.trim()).filter(Boolean));
        return Array.from(new Set(all));
      }
      if (key === 'materiales') {
        // Split by comma and trim, then get unique values
        const all = juegos.flatMap(j => (j.materiales||'').split(',').map(s => s.trim()).filter(Boolean));
        return Array.from(new Set(all));
      }
      return Array.from(new Set(juegos.map(j => j[key]).filter(v => v && v !== '')));
    }

        } else {
          const opciones = getValoresUnicos(f.key);
          return `<div><label for="planif-${f.key}">${f.label}</label><select id="planif-${f.key}" onchange="filtrarPlanificar()"><option value="">(Todos)</option>${opciones.map(o => `<option value="${o}">${o}</option>`).join('')}</select></div>`;
        }
      }).join('');
    }

    function filtrarPlanificar() {
      const filtros = [
        { key: 'clasificacion', id: 'planif-clasificacion' },
        { key: 'intensidad', id: 'planif-intensidad' },
        { key: 'lugar', id: 'planif-lugar' },
        { key: 'participantes', id: 'planif-participantes' },
        { key: 'edades', id: 'planif-edades' },
        { key: 'materiales', id: 'planif-materiales' }
      ];
      let resultados = juegos.filter(juego => {
        return filtros.every(f => {
          const val = document.getElementById(f.id)?.value || '';
          if (!val) return true;
          if (f.key === 'clasificacion') {
            // Match if any of the game's categories matches the selected value
            return (juego.clasificacion||'').split(',').map(s=>s.trim()).includes(val);
          }
          if (f.key === 'materiales') {
            // Match if any of the game's materials matches the selected value
            return (juego.materiales||'').split(',').map(s=>s.trim()).includes(val);
          }
          if (f.key === 'participantes') {
            // Check if the number is between min and max
            const h = parseInt(val, 10);
            if (isNaN(h)) return true;
            let min = null, max = null;
            if (juego.participantes) {
              const partes = juego.participantes.split('-').map(x=>parseInt(x.trim(),10));
              if (partes.length === 2 && !isNaN(partes[0]) && !isNaN(partes[1])) {
                min = partes[0]; max = partes[1];
              } else if (partes.length === 1 && !isNaN(partes[0])) {
                min = max = partes[0];
              }
            }
            if (min !== null && max !== null) {
              return h >= min && h <= max;
            }
            return false;
          }
          if (f.key === 'edades') {
            const h = parseInt(val, 10);
            if (isNaN(h)) return true;
            let min = null, max = null;
            if (juego.edades) {
              const partes = juego.edades.split('-').map(x=>parseInt(x.trim(),10));
              if (partes.length === 2 && !isNaN(partes[0]) && !isNaN(partes[1])) {
                min = partes[0]; max = partes[1];
              } else if (partes.length === 1 && !isNaN(partes[0])) {
                min = max = partes[0];
              }
            }
            if (min !== null && max !== null) {
              return h >= min && h <= max;
            }
            return false;
          }
          return (juego[f.key] || '') === val;
        });
      });
      renderizarResultadosPlanificar(resultados);
    }

    function descargarFichaPDF(juego) {
      if (typeof window.jspdf === 'undefined' && typeof window.jsPDF === 'undefined') {
        alert('Para exportar a PDF, se necesita la librería jsPDF.');
        return;
      }
      const doc = new (window.jspdf ? window.jspdf.jsPDF : window.jsPDF)({
        orientation: 'portrait',
        unit: 'pt',
        format: 'a4'
      });
      const mainFont = 'times';
      let y = 40;
      let pageNum = 1;
      
      // Función para agregar decoraciones en esquinas
      const addCornerDecorations = () => {
        // Color azul verdoso (similar a la imagen adjunta)
        doc.setFillColor(100, 200, 180); // Azul-verde suave
        doc.setDrawColor(80, 180, 160);
        
        // Esquina superior izquierda
        doc.circle(15, 15, 20, 'F');
        // Esquina superior derecha
        doc.circle(582, 15, 20, 'F');
        // Esquina inferior izquierda
        doc.circle(15, 827, 20, 'F');
        // Esquina inferior derecha
        doc.circle(582, 827, 20, 'F');
      };
      
      // Función auxiliar para agregar número de página
      const addPageNumber = () => {
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text(pageNum.toString(), 540, 810, {align: 'right'});
        addCornerDecorations();
      };
      
      // Agregar decoraciones en la primera página
      addCornerDecorations();
      
      // --- TÍTULO ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(22);
      doc.setTextColor(0, 0, 0);
      doc.text(juego.nombre || '-', 300, y, {align: 'center'});
      y += 40;
      
      // --- DOS COLUMNAS: Datos clave ---
      const margin = 40;
      const colWidth = 230;
      let x1 = margin;
      let x2 = x1 + colWidth + 40;
      
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(10);
      doc.setTextColor(0, 0, 0);
      
      // Columna izquierda
      doc.text('CLASIFICACIÓN:', x1, y);
      doc.setFont(mainFont, 'normal');
      doc.text(juego.clasificacion || '-', x1 + 5, y + 14);
      
      // Columna derecha
      doc.setFont(mainFont, 'bold');
      doc.text('LUGAR:', x2, y);
      doc.setFont(mainFont, 'normal');
      doc.text(juego.lugar || '-', x2 + 5, y + 14);
      
      y += 36;
      
      // Segunda fila
      doc.setFont(mainFont, 'bold');
      doc.text('EDAD:', x1, y);
      doc.setFont(mainFont, 'normal');
      doc.text(juego.edades || '-', x1 + 5, y + 14);
      
      doc.setFont(mainFont, 'bold');
      doc.text('Nº DE PARTICIPANTES:', x2, y);
      doc.setFont(mainFont, 'normal');
      doc.text(juego.participantes || '-', x2 + 5, y + 14);
      
      y += 36;
      
      // Tercera fila - solo intensidad
      doc.setFont(mainFont, 'bold');
      doc.text('INTENSIDAD:', x1, y);
      doc.setFont(mainFont, 'normal');
      doc.text(juego.intensidad || '-', x1 + 5, y + 14);
      
      y += 40;
      
      // --- OBJETIVOS ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(11);
      doc.text('OBJETIVOS:', margin, y);
      y += 14;
      doc.setFont(mainFont, 'normal');
      doc.setFontSize(10);
      let split = doc.splitTextToSize(juego.objetivo || '-', 500);
      doc.text(split, margin + 5, y);
      y += Math.max(18, split.length * 12) + 10;
      
      if (y > 700) {
        addPageNumber();
        doc.addPage();
        addCornerDecorations();
        y = 40;
        pageNum++;
      }
      
      // --- MATERIALES ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(11);
      doc.text('MATERIALES:', margin, y);
      y += 14;
      doc.setFont(mainFont, 'normal');
      doc.setFontSize(10);
      split = doc.splitTextToSize(juego.materiales || '-', 500);
      doc.text(split, margin + 5, y);
      y += Math.max(18, split.length * 12) + 10;
      
      if (y > 700) {
        addPageNumber();
        doc.addPage();
        addCornerDecorations();
        y = 40;
        pageNum++;
      }
      
      // --- DESARROLLO DEL JUEGO ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(11);
      doc.text('DESARROLLO DEL JUEGO:', margin, y);
      y += 14;
      doc.setFont(mainFont, 'normal');
      doc.setFontSize(10);
      split = doc.splitTextToSize(juego.desarrollo || '-', 500);
      doc.text(split, margin + 5, y);
      y += Math.max(18, split.length * 12) + 10;
      
      if (y > 700) {
        addPageNumber();
        doc.addPage();
        addCornerDecorations();
        y = 40;
        pageNum++;
      }
      
      // --- VARIANTES ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(11);
      doc.text('VARIANTES:', margin, y);
      y += 14;
      doc.setFont(mainFont, 'normal');
      doc.setFontSize(10);
      if (juego.variantes && juego.variantes.trim()) {
        let variantes = juego.variantes.split('\n').filter(v => v.trim());
        variantes.forEach(variante => {
          if (y > 700) {
            addPageNumber();
            doc.addPage();
            addCornerDecorations();
            y = 40;
            pageNum++;
          }
          split = doc.splitTextToSize('• ' + variante.trim(), 480);
          doc.text(split, margin + 10, y);
          y += Math.max(12, split.length * 12) + 3;
        });
      } else {
        doc.text('-', margin + 5, y);
        y += 14;
      }
      y += 10;
      
      if (y > 700) {
        addPageNumber();
        doc.addPage();
        addCornerDecorations();
        y = 40;
        pageNum++;
      }
      
      // --- OBSERVACIONES ---
      doc.setFont(mainFont, 'bold');
      doc.setFontSize(11);
      doc.text('OBSERVACIONES:', margin, y);
      y += 14;
      doc.setFont(mainFont, 'normal');
      doc.setFontSize(10);
      split = doc.splitTextToSize(juego.observaciones || '-', 500);
      doc.text(split, margin + 5, y);
      y += Math.max(18, split.length * 12) + 10;
      
      if (y > 700) {
        addPageNumber();
        doc.addPage();
        addCornerDecorations();
        y = 40;
        pageNum++;
      }
      
      // --- COMENTARIOS (si existen) ---
      if (juego.comentarios && juego.comentarios.length > 0) {
        if (y > 700) {
          addPageNumber();
          doc.addPage();
          addCornerDecorations();
          y = 40;
          pageNum++;
        }
        
        doc.setFont(mainFont, 'bold');
        doc.setFontSize(11);
        doc.text('COMENTARIOS:', margin, y);
        y += 14;
        doc.setFont(mainFont, 'normal');
        doc.setFontSize(10);
        
        juego.comentarios.forEach(comentario => {
          if (y > 700) {
            addPageNumber();
            doc.addPage();
            addCornerDecorations();
            y = 40;
            pageNum++;
          }
          doc.setTextColor(100, 100, 100);
          doc.setFont(mainFont, 'italic');
          doc.text(comentario.fecha, margin + 5, y);
          doc.setFont(mainFont, 'normal');
          doc.setTextColor(0, 0, 0);
          split = doc.splitTextToSize(comentario.texto, 480);
          doc.text(split, margin + 35, y);
          y += Math.max(16, split.length * 10) + 8;
        });
      }
      
      // Número de página final
      addPageNumber();
      doc.save((juego.nombre || 'ficha') + '.pdf');
    }

    window.descargarFichaPDF = descargarFichaPDF;

    document.addEventListener('DOMContentLoaded', () => {
      // Cargar primero desde localStorage, luego intentar Firebase
      cargarDesdeLocalStorage();
      if (firebaseReady) {
        cargarDesdeFirebase();
      }
      actualizarTabla();
      actualizarTablaTodos();
      actualizarClasificacionSelects();
      actualizarEstadosCampos();
      actualizarIntensidadColor();

      $('guardarBtn').addEventListener('click', registrarJuego);
      $('limpiarBtn').addEventListener('click', limpiarFormulario);
      $('intensidad').addEventListener('change', actualizarIntensidadColor);
      ['clasificacion1','clasificacion2','clasificacion3'].forEach(id => {
        $(id).addEventListener('change', actualizarClasificacionSelects);
        $(id).addEventListener('change', actualizarEstadosCampos);
      });

      document.querySelectorAll('input, select, textarea').forEach(campo => {
        campo.addEventListener('input', actualizarEstadosCampos);
        campo.addEventListener('change', actualizarEstadosCampos);
      });

      // --- Pestañas ---
      const tabButtons = document.querySelectorAll('.tab');
      const tabPanels = document.querySelectorAll('.tab-panel');
      tabButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          // Quitar clase active de todos los botones y paneles
          tabButtons.forEach(b => b.classList.remove('active'));
          tabPanels.forEach(p => p.classList.remove('active'));
          // Activar el botón y panel correspondiente
          this.classList.add('active');
          const panel = document.getElementById('tab-' + this.dataset.tab);
          if (panel) panel.classList.add('active');
          // Acciones al cambiar de pestaña
          if (this.dataset.tab === 'planificar') {
            renderizarFiltrosPlanificar();
            filtrarPlanificar();
          }
          if (this.dataset.tab === 'todos') {
            actualizarTablaTodos();
          }
          if (this.dataset.tab === 'buscar') {
            actualizarTabla();
          }
        });
      });

      // Buscar
      const filtroInput = document.getElementById('filtro');
      if (filtroInput) {
        filtroInput.addEventListener('input', actualizarTabla);
      }
      // Editar modo botones
      const btnEditarModoBuscar = document.getElementById('btnEditarModoBuscar');
      if (btnEditarModoBuscar) btnEditarModoBuscar.addEventListener('click', habilitarModoEditar);
      const btnEditarModoTodos = document.getElementById('btnEditarModoTodos');
      if (btnEditarModoTodos) btnEditarModoTodos.addEventListener('click', habilitarModoEditar);

      // Inicializar solo el panel activo y asegurar que solo uno tenga la clase 'active'
      tabPanels.forEach((p, i) => {
        if (i === 0) {
          p.classList.add('active');
        } else {
          p.classList.remove('active');
        }
      });
      tabButtons.forEach((b, i) => {
        if (i === 0) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }
      });
      // Inicializar filtros planificar si la pestaña activa es planificar
      const tabActiva = document.querySelector('.tab.active');
      if (tabActiva && tabActiva.dataset.tab === 'planificar') {
        renderizarFiltrosPlanificar();
        filtrarPlanificar();
      }
      actualizarEstadosCampos && actualizarEstadosCampos();
    });

    // Guardar datos antes de cerrar o cambiar de página
    window.addEventListener('beforeunload', () => {
      guardarDatos();
    });

    // Guardar también cuando pierde el foco la ventana
    window.addEventListener('blur', () => {
      guardarDatos();
    });
  </script>
</body>
</html>
